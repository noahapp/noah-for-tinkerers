<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Noah">
  <title>Noah</title>

  <!-- ── Canonical Noah icon source ──
       Two interlocking-aurora rings + indigo focal dot, on a soft
       aurora-washed white plate.

       Geometry (64-unit viewBox):
         • Ring 1 (cool) center (22, 22) r 13.
         • Ring 2 (warm) center (42, 42) r 13.
         • Center-to-center distance ≈ 28.3, ring diameters ≈ 26 —
           rings nearly touch at the (32, 32) bridge but don't overlap,
           so each C-shape reads distinctly.
         • Each arc spans 270° (large-arc-flag = 1), opening toward
           the focal dot at the center. Opposite sweep flags so the
           visible arc of each ring takes the long way through its
           own quadrant of the canvas.
         • Symbol bounds (9, 9) → (55, 55) — 72% of canvas. ── -->

  <defs>
    <linearGradient id="bgWash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#5b9bd5" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.14"/>
    </linearGradient>
    <radialGradient id="focalHalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#6366f1" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Plate: white + faint aurora wash. macOS / Windows don't
       auto-plate transparent PNGs, so the plate is baked in. -->
  <rect width="64" height="64" rx="14" fill="#ffffff"/>
  <rect width="64" height="64" rx="14" fill="url(#bgWash)"/>

  <!-- Focal halo. -->
  <circle cx="32" cy="32" r="14" fill="url(#focalHalo)"/>

  <!-- Cool ring (top-left), aurora-blue.
       Endpoints: bottom (22, 35) and right (35, 22).
       Arc takes the long way (270°) through (9, 22) left and
       (22, 9) top with sweep=0. -->
  <path d="M 35 22 A 13 13 0 1 0 22 35"
        fill="none" stroke="#5b9bd5" stroke-width="5"
        stroke-linecap="round"/>

  <!-- Violet ring (bottom-right), aurora-violet.
       Endpoints: top (42, 29) and left (29, 42).
       Arc takes the long way through (55, 42) right and
       (42, 55) bottom with sweep=1 (mirror of cool ring). -->
  <path d="M 42 29 A 13 13 0 1 1 29 42"
        fill="none" stroke="#8b5cf6" stroke-width="5"
        stroke-linecap="round"/>

  <!-- Focal dot — the visual center where the two loops link. -->
  <circle cx="32" cy="32" r="4.5" fill="#6366f1"/>
</svg>
